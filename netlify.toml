# ────────────────────────────────────────────────────────────
# Netlify configuration — Agency Template
# ────────────────────────────────────────────────────────────

[build]
  command         = "npm run build"
  publish         = "dist"
  ignore          = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- src/ public/ index.html package.json vite.config.js tailwind.config.js"

[build.environment]
  NODE_VERSION    = "20"
  NPM_VERSION     = "10"

# ── Dev server ───────────────────────────────────────────────
[dev]
  command         = "npm run dev"
  port            = 5173
  targetPort      = 5173
  publish         = "dist"
  autoLaunch      = true

# ── SPA redirect (all routes → index.html) ──────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers (all routes) ───────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://formspree.io; frame-ancestors 'none';"

# ── Hashed assets — cache forever ───────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Static files — short cache ───────────────────────────────
[[headers]]
  for = "/*.{svg,ico,png,webmanifest,txt}"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── HTML — always revalidate ─────────────────────────────────
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Context-specific overrides ───────────────────────────────
[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
