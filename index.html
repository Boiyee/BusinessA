<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <meta
      name="description"
      content="Nexus Agency — Strategy, design, and technology for ambitious brands. Building what comes next."
    />
    <meta
      name="keywords"
      content="digital agency, brand strategy, web design, mobile app development, AI integration"
    />
    <meta name="author" content="Nexus Agency" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nexus Agency" />
    <meta property="og:title" content="Nexus Agency — Building What Comes Next" />
    <meta
      property="og:description"
      content="Strategy, design, and technology for ambitious brands."
    />
    <meta property="og:image" content="https://nexusagency.co/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://nexusagency.co" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@nexusagency" />
    <meta name="twitter:title" content="Nexus Agency — Building What Comes Next" />
    <meta
      name="twitter:description"
      content="Strategy, design, and technology for ambitious brands."
    />
    <meta name="twitter:image" content="https://nexusagency.co/og-image.jpg" />

    <!-- Favicon set -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Canonical -->
    <link rel="canonical" href="https://nexusagency.co" />

    <!-- Font preconnect (critical for LCP) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Nexus Agency",
        "url": "https://nexusagency.co",
        "logo": "https://nexusagency.co/logo.png",
        "description": "Full-service digital agency combining strategy, design, and engineering.",
        "foundingDate": "2012",
        "numberOfEmployees": { "@type": "QuantitativeValue", "value": 40 },
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Innovation Drive",
          "addressLocality": "San Francisco",
          "addressRegion": "CA",
          "postalCode": "94105",
          "addressCountry": "US"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+1-555-000-0000",
          "email": "hello@nexusagency.co",
          "contactType": "customer service"
        },
        "sameAs": [
          "https://twitter.com/nexusagency",
          "https://linkedin.com/company/nexusagency",
          "https://dribbble.com/nexusagency"
        ]
      }
    </script>

    <title>Nexus Agency — Building What Comes Next</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
